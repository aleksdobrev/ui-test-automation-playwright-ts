name: Regression Tests
on:
  push:
    branches: master
    # branches: '**' - Option to run on push to all branches, but it can be noisy.
    # branches:
    #   - 'master' - Run on push to master branch.
    #   - 'feature/**' - Option to run on push to feature branches.
  pull_request:
    branches: master
  # schedule:
  # - cron: '30 2 * * *' # Runs every day at 2:30 AM UTC. Adjust the schedule as needed.
  # * * * * * - Minute, Hour, Day of Month, Month, Day of Week(0 - 6 or SUN-SAT)
jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Regression tests
        run: npm run test:regression
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 10
